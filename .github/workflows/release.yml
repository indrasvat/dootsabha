name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          SHORT_COMMIT="${COMMIT::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BINARY="dootsabha-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build \
            -ldflags "-X github.com/indrasvat/dootsabha/internal/version.Version=${VERSION} -X github.com/indrasvat/dootsabha/internal/version.Commit=${SHORT_COMMIT} -X github.com/indrasvat/dootsabha/internal/version.Date=${DATE}" \
            -o "dist/${BINARY}" \
            ./cmd/dootsabha

      - uses: actions/upload-artifact@v4
        with:
          name: dootsabha-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum dootsabha-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dootsabha-*
            dist/checksums.txt
