name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.9.0
          args: --timeout=5m

      - name: fmt-check
        run: make fmt-check

      - name: vet
        run: make vet

      - name: test
        run: make test
