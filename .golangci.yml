version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - errorlint
    - misspell

formatters:
  enable:
    - gofumpt

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
